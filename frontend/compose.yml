---
services:
  paper-frontend:
    build:
      context: ${BASE_DIR}
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - API_URL_SERVER=${API_URL_SERVER}
        - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
        - NEXTAUTH_URL=${NEXTAUTH_URL}
    ports:
      - "3000:3000"
    env_file:
      - $BASE_DIR/.env
    restart: always
    networks:
      - paper-summary-network

networks:
  paper-summary-network:
