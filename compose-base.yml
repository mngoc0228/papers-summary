---
services:
  paper-db:
    image: postgres:18
    restart: always
    healthcheck:
      test: ["CMD", "pg_isready", "--host=localhost", "--username=arxiv_user", "--dbname=arxiv_db"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - ./data/postgres:/var/lib/postgresql/data/pgdata
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_DB: ${POSTGRES_DB:-arxiv_db}
      POSTGRES_USER: ${POSTGRES_USER:-arxiv_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arxiv_password}
    ports:
      - "5432:5432"
    networks:
      - paper-summary-network

networks:
  paper-summary-network:
